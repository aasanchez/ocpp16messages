name: Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0" # 06:00 UTC weekly (Sunday)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  quality:
    name: Race + Fuzz + Bench + Test-all
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install lint tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Run full test-all
        run: make test-all

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: weekly-artifacts-${{ github.run_number }}
          path: reports/**
          if-no-files-found: ignore

  govulncheck:
    name: govulncheck + module verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download and verify modules
        run: go mod download && go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -test ./...

  analyze:
    name: CodeQL analysis (Go)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:go"

  scorecard:
    name: OpenSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Run scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif

  goreportcard:
    name: Go Report Card
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Refresh Go Report Card
        uses: creekorful/goreportcard-action@v1.0

  apidiff:
    name: API diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@latest

      - name: Compare against latest tag
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            echo "::notice::No version tags found; skipping apidiff."
            exit 0
          fi

          echo "::notice::Comparing API against ${latest_tag}"

          worktree="$(mktemp -d)"
          trap 'git worktree remove --force "${worktree}" >/dev/null 2>&1 || true' EXIT
          git worktree add "${worktree}" "${latest_tag}" >/dev/null

          # Download modules for both old and new versions
          (cd "${worktree}" && go mod download)
          go mod download

          apidiff -incompatible -m "${worktree}" "${GITHUB_WORKSPACE}" \
            | tee reports/apidiff.txt

          if [[ -s reports/apidiff.txt ]]; then
            echo "::error::Incompatible public API changes detected vs ${latest_tag}"
            exit 1
          fi

          echo "::notice::No incompatible public API changes detected."

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Review dependencies
        uses: actions/dependency-review-action@v4.9.0
