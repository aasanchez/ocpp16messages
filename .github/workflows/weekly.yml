name: Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0" # 06:00 UTC weekly (Sunday)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Race + Fuzz + Bench + Test-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Clean caches
        run: go clean -cache -testcache -modcache

      - name: Run full test-all
        run: make test-all

      - name: Run race detector (opt-in)
        run: make test-race

      - name: Run fuzzers (short)
        run: FUZZPROCS=4 make test-fuzz

      - name: Run benchmarks (smoke)
        run: make test-bench

      - name: Upload reports
        uses: actions/upload-artifact@v7.0.0
        with:
          name: weekly-artifacts-${{ github.run_number }}
          path: reports/**
          if-no-files-found: ignore

  govulncheck:
    name: govulncheck + module verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Clean caches
        run: go clean -cache -testcache -modcache

      - name: Download modules
        run: go mod download

      - name: Verify module content
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -test ./...

  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1

      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:go"
