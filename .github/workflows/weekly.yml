name: Weekly

on:
  schedule:
    - cron: "0 5 * * 0" # 05:00 UTC weekly (Sunday)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Race + Fuzz + Bench + Test-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
          cache: false

      - name: Clean caches
        run: go clean -cache -testcache -modcache

      - name: Run full test-all
        run: make test-all

      - name: Run race detector (opt-in)
        run: make test-race

      - name: Run fuzzers (short)
        run: FUZZPROCS=4 make test-fuzz

      - name: Run benchmarks (smoke)
        run: make test-bench

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-artifacts-${{ github.run_number }}
          path: reports/**
          if-no-files-found: ignore

