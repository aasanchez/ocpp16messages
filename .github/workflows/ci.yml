name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  module:
    name: Module hygiene (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - name: go mod verify
        run: |
          go mod download
          go mod verify

      - name: go mod tidy (must be clean)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  test:
    name: Test (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - 1.25.7
          - 1.26.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Unit tests
        run: go test -mod=readonly -v ./...

  coverage:
    name: Coverage (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - run: mkdir -p reports

      - name: Clean caches
        run: go clean -cache -testcache -modcache

      - name: Execute tests with coverage
        run: |
          go test -mod=readonly \
              -coverpkg=./... \
              -coverprofile=reports/coverage.out \
              -v ./... | tee reports/unittest.txt

      - name: Coverage summary
        run: go tool cover -func=reports/coverage.out

      - name: Coverage annotation
        run: |
          total="$(go tool cover -func=reports/coverage.out | tail -n 1 | awk '{print $NF}')"
          echo "::notice::Total coverage: ${total}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts-${{ github.run_number }}
          path: reports
          retention-days: 7

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: reports/coverage.out
          fail_ci_if_error: true

  race:
    name: Race (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - name: Race suite (opt-in)
        run: make test-race

  golangci-lint:
    name: golangci-lint (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.7
          args: --config golangci.yml --timeout=5m ./...

      - name: Report
        run: cat reports/golangci-lint.txt || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: golangci-lint-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  staticcheck:
    name: staticcheck (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - run: mkdir -p reports

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck (annotations)
        run: |
          set -o pipefail
          staticcheck ./... 2>&1 | tee reports/staticcheck.txt | bash scripts/annotate-go-diagnostics.sh error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staticcheck-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  vet:
    name: go vet (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - run: mkdir -p reports

      - name: go vet (annotations)
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee reports/vet.txt | bash scripts/annotate-go-diagnostics.sh error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: govet-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  docs:
    name: Docs smoke (ubuntu / go1.26.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
          cache: false

      - name: Package list
        run: go list ./...

      - name: Example tests
        run: go test -mod=readonly -run '^Example' ./...
