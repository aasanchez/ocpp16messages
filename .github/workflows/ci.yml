name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  module:
    name: Module hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Download and verify modules
        run: go mod download && go mod verify

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  test:
    name: Test (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - 1.25.8
          - 1.26.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Run unit tests
        run: go test -mod=readonly -v ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run tests with coverage
        run: |
          go test -mod=readonly \
              -coverpkg=$(go list ./... | grep -v -e /scripts -e /tests -e tests_ | tr '\n' ',' | sed 's/,$//') \
              -coverprofile=reports/coverage.out \
              -v ./... | tee reports/unittest.txt

      - name: Coverage summary
        run: go tool cover -func=reports/coverage.out

      - name: Annotate coverage total
        run: |
          total="$(go tool cover -func=reports/coverage.out | tail -n 1 | awk '{print $NF}')"
          echo "::notice::Total coverage: ${total}"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-artifacts-${{ github.run_number }}
          path: reports
          retention-days: 7

      - name: Warn if Codecov token is missing
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CODECOV_TOKEN == '' }}
        run: |
          echo "::warning::CODECOV_TOKEN is not set; Codecov uploads are skipped for protected branches."
          echo "::warning::Add CODECOV_TOKEN in GitHub repo secrets to enable Codecov gating."

      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6.0.0
        with:
          files: reports/coverage.out
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

  race:
    name: Race detector
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Run race detector
        run: make test-race

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --config golangci.yml --timeout=5m ./...

      - name: Annotate lint findings
        if: always()
        run: |
          if [[ -f reports/golangci-lint.txt ]]; then
            grep -E '^[^:]+:[0-9]+(:[0-9]+)?:' reports/golangci-lint.txt \
              | bash scripts/annotate-go-diagnostics.sh error || true
          fi

      - name: Print lint report
        if: always()
        run: cat reports/golangci-lint.txt || true

      - name: Upload lint artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: golangci-lint-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: |
          set -o pipefail
          staticcheck ./... 2>&1 | tee reports/staticcheck.txt | bash scripts/annotate-go-diagnostics.sh error

      - name: Upload staticcheck artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: staticcheck-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  vet:
    name: go vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run go vet
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee reports/vet.txt | bash scripts/annotate-go-diagnostics.sh error

      - name: Upload vet artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: govet-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  docs:
    name: Docs smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: List packages
        run: go list ./...

      - name: Run example tests
        run: go test -mod=readonly -run '^Example' ./...

  required:
    name: Required checks
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - module
      - test
      - coverage
      - race
      - golangci-lint
      - staticcheck
      - vet
      - docs
    steps:
      - name: Verify all checks passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "${results}" | jq -e 'all(. == "success" or . == "skipped")' > /dev/null
