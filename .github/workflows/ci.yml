name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  module:
    name: Module hygiene (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - name: go mod verify
        run: |
          go mod download
          go mod verify

      - name: go mod tidy (must be clean)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  test:
    name: Test (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - 1.25.8
          - 1.26.1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Unit tests
        run: go test -mod=readonly -v ./...

  coverage:
    name: Coverage (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - run: mkdir -p reports

      - name: Clean caches
        run: go clean -cache -testcache -modcache

      - name: Execute tests with coverage
        run: |
          go test -mod=readonly \
              -coverpkg=./... \
              -coverprofile=reports/coverage.out \
              -v ./... | tee reports/unittest.txt

      - name: Coverage summary
        run: go tool cover -func=reports/coverage.out

      - name: Coverage annotation
        run: |
          total="$(go tool cover -func=reports/coverage.out | tail -n 1 | awk '{print $NF}')"
          echo "::notice::Total coverage: ${total}"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-artifacts-${{ github.run_number }}
          path: reports
          retention-days: 7

      - name: Codecov token notice
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CODECOV_TOKEN == '' }}
        run: |
          echo "::warning::CODECOV_TOKEN is not set; Codecov uploads are skipped for protected branches."
          echo "::warning::Add CODECOV_TOKEN in GitHub repo secrets to enable Codecov gating."

      - name: Upload to Codecov (token)
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: reports/coverage.out
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Upload to Codecov (no token)
        if: ${{ env.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: reports/coverage.out
          fail_ci_if_error: false

  apidiff:
    name: API diff (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - run: mkdir -p reports

      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@latest

      - name: Compare against latest tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "::notice::Not a pull_request event; skipping apidiff."
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            echo "::notice::No version tags found; skipping apidiff."
            exit 0
          fi

          echo "::notice::Comparing API against ${latest_tag}"

          worktree="$(mktemp -d)"
          trap 'git worktree remove --force "${worktree}" >/dev/null 2>&1 || true' EXIT
          git worktree add "${worktree}" "${latest_tag}" >/dev/null

          apidiff -incompatible -m "${worktree}" "${GITHUB_WORKSPACE}" \
            | tee reports/apidiff.txt

          if [[ -s reports/apidiff.txt ]]; then
            echo "::error::Incompatible public API changes detected vs ${latest_tag}"
            exit 1
          fi

          echo "::notice::No incompatible public API changes detected."

  race:
    name: Race (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Race suite (opt-in)
        run: make test-race

  golangci-lint:
    name: golangci-lint (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - run: mkdir -p reports

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.7
          args: --config golangci.yml --timeout=5m ./...

      - name: Annotations
        run: |
          if [[ -f reports/golangci-lint.txt ]]; then
            grep -E '^[^:]+:[0-9]+(:[0-9]+)?:' reports/golangci-lint.txt \
              | bash scripts/annotate-go-diagnostics.sh error || true
          fi

      - name: Report
        run: cat reports/golangci-lint.txt || true

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: golangci-lint-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  staticcheck:
    name: staticcheck (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - run: mkdir -p reports

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck (annotations)
        run: |
          set -o pipefail
          staticcheck ./... 2>&1 | tee reports/staticcheck.txt | bash scripts/annotate-go-diagnostics.sh error

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: staticcheck-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  vet:
    name: go vet (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - run: mkdir -p reports

      - name: go vet (annotations)
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee reports/vet.txt | bash scripts/annotate-go-diagnostics.sh error

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: govet-artifacts-${{ github.run_number }}
          include-hidden-files: true
          path: reports/

  docs:
    name: Docs smoke (ubuntu / go1.26.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Package list
        run: go list ./...

      - name: Example tests
        run: go test -mod=readonly -run '^Example' ./...

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - module
      - test
      - coverage
      - apidiff
      - race
      - golangci-lint
      - staticcheck
      - vet
      - docs
    steps:
      - name: All required checks passed
        run: echo "ok"
