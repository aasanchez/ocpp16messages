name: Benchstat

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  benchstat:
    name: Benchstat (vs previous tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Detect previous tag
        id: prev
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          tag="${TAG_NAME}"
          prev="$(
            git tag --list 'v[0-9]*' --sort=-version:refname \
              | awk -v t="${tag}" '$0 == t {found=1; next} found {print; exit}'
          )"

          echo "prev=${prev}" >>"${GITHUB_OUTPUT}"

      - name: Run benchmarks (current tag)
        run: |
          set -euo pipefail
          go test -tags=bench -run=^$ -bench=. -count=5 ./tests_benchmark | tee bench-new.txt

      - name: Run benchmarks (previous tag)
        if: ${{ steps.prev.outputs.prev != '' }}
        shell: bash
        env:
          PREV_TAG: ${{ steps.prev.outputs.prev }}
        run: |
          set -euo pipefail

          prev="${PREV_TAG}"
          worktree="$(mktemp -d)"
          trap 'rm -rf "${worktree}"' EXIT

          git worktree add "${worktree}" "${prev}"
          pushd "${worktree}" >/dev/null
          go test -tags=bench -run=^$ -bench=. -count=5 ./tests_benchmark | tee "${GITHUB_WORKSPACE}/bench-old.txt"
          popd >/dev/null

      - name: benchstat
        if: ${{ steps.prev.outputs.prev != '' }}
        run: benchstat bench-old.txt bench-new.txt | tee benchstat.txt

      - name: Create benchstat (no previous tag)
        if: ${{ steps.prev.outputs.prev == '' }}
        run: |
          printf '%s\n' "No previous tag found; only current benchmarks were run." | tee benchstat.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchstat-${{ github.ref_name }}
          path: |
            bench-new.txt
            bench-old.txt
            benchstat.txt
          if-no-files-found: ignore

      - name: Attach to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME}"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            echo "No release found for '${tag}'. Skipping asset upload."
            exit 0
          fi

          gh release upload "${tag}" benchstat.txt bench-new.txt --clobber
          if [[ -f bench-old.txt ]]; then
            gh release upload "${tag}" bench-old.txt --clobber
          fi
