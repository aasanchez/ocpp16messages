name: OpenSSF Scorecard

on:
  workflow_dispatch:
  branch_protection_rule:
  schedule:
    - cron: "0 4 * * 0" # 04:00 UTC weekly (Sunday)
  push:
    branches:
      - main

permissions: read-all

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          # Optional: set SCORECARD_TOKEN to enable additional checks (see
          # ossf/scorecard-action docs for fine-grained PAT requirements).
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@db2c8fe24a75c0f28f87ed1a6fe918a5ccf7b1e6 # v4.31.10
        with:
          sarif_file: results.sarif
